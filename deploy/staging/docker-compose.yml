services:
  app:
    image: ghcr.io/haruotsu/slack-review-notify:latest
    container_name: slack-review-notify-staging
    ports:
      - "8080:8080"
    environment:
      # Slack設定
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      # GitHub設定
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      # データベース設定
      - DB_PATH=/app/data/staging_review_tasks.db
      # ログレベル（本番では info, ステージングでは debug も可）
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # DBファイルの永続化
      - staging-db-data:/app/data
      # ログファイルの永続化（オプション）
      - staging-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - staging-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # リソース制限（ステージング環境に応じて調整）
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Nginx リバースプロキシ（HTTPS対応）
  nginx:
    image: nginx:alpine
    container_name: slack-review-notify-nginx-staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      app:
        condition: service_healthy
    networks:
      - staging-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # データベースバックアップサービス（オプション）
  backup:
    image: alpine:latest
    container_name: slack-review-notify-backup-staging
    volumes:
      - staging-db-data:/data:ro
      - ./backups:/backups
    command: >
      sh -c "while true; do
        DATE=$$(date +%Y%m%d_%H%M%S);
        cp /data/staging_review_tasks.db /backups/staging_review_tasks_$$DATE.db 2>/dev/null || true;
        find /backups -name 'staging_review_tasks_*.db' -mtime +7 -delete;
        sleep 86400;
      done"
    networks:
      - staging-network
    restart: unless-stopped

volumes:
  staging-db-data:
    driver: local
  staging-logs:
    driver: local
  nginx-cache:
    driver: local

networks:
  staging-network:
    driver: bridge
