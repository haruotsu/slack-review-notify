services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: slack-review-notify-test
    ports:
      - "8080:8080"
    environment:
      # Slack設定
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-xoxb-test-token}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-test-signing-secret}
      # GitHub設定（テストモードでは空にして署名検証をスキップ）
      - GITHUB_WEBHOOK_SECRET=
      # データベース設定
      - DB_PATH=/app/data/test_review_tasks.db
    volumes:
      # テスト用DBファイルの永続化
      - test-db-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - test-network
    restart: unless-stopped

  # テスト用のモックサーバー（将来的にSlack/GitHubのモックとして使用可能）
  mock-server:
    image: mockserver/mockserver:latest
    container_name: slack-review-notify-mock
    ports:
      - "1080:1080"
    environment:
      - MOCKSERVER_INITIALIZATION_JSON_PATH=/config/initializer.json
    volumes:
      - ./test/mock:/config
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:1080/mockserver/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - test-network
    restart: unless-stopped

volumes:
  test-db-data:
    driver: local

networks:
  test-network:
    driver: bridge
